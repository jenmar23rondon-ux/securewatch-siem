name: SecureWatch CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: securewatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend-node/package-lock.json
            frontend/package-lock.json

      - name: Backend build
        working-directory: backend-node
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/securewatch
          JWT_SECRET: ci-secret
          FRONTEND_ORIGIN: http://localhost:5173
          ANALYZER_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379
        run: |
          npm ci
          npx prisma validate
          npm run build

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Python analyzer dependencies
        working-directory: analyzer-python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Docker compose validation
        run: docker compose config

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t securewatch-backend ./backend-node
      - run: docker build -t securewatch-frontend ./frontend
      - run: docker build -t securewatch-analyzer ./analyzer-python
