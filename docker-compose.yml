services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: securewatch_siem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  analyzer-python:
    build: ./analyzer-python
    ports:
      - "8000:8000"

  backend-node:
    build: ./backend-node
    depends_on:
      - postgres
      - redis
      - analyzer-python
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/securewatch_siem
      JWT_SECRET: docker_securewatch_secret_change_me
      JWT_EXPIRES_IN: 7d
      FRONTEND_ORIGIN: http://localhost:5173
      ANALYZER_URL: http://analyzer-python:8000
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    depends_on:
      - backend-node
    ports:
      - "5173:80"

volumes:
  postgres_data:
